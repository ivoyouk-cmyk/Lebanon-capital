<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lebanon Capital — الاستثمار الذكي</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: { sans: ['Tajawal', 'sans-serif'] },
      colors: {
        accent:       '#8C2828',
        'accent-lit': '#b03535',
        'accent-dk':  '#6b1e1e',
      }
    }
  }
}
</script>
<style>
  * { font-family: 'Tajawal', sans-serif; }
  @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  .ticker-inner { animation: ticker 35s linear infinite; }
  .ticker-wrap:hover .ticker-inner { animation-play-state: paused; }
  .fade-up { opacity:0; transform:translateY(28px); transition:opacity .65s ease,transform .65s ease; }
  .fade-up.visible { opacity:1; transform:translateY(0); }
  .grad-text { background:linear-gradient(135deg,#8C2828,#c04040,#e06060); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .btn-glow { box-shadow:0 0 22px rgba(140,40,40,.40); transition:box-shadow .3s,transform .2s; }
  .btn-glow:hover { box-shadow:0 0 42px rgba(140,40,40,.60); transform:translateY(-2px); }
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:#8C2828; border-radius:99px; }
  .nav-link { position:relative; }
  .nav-link::after { content:''; position:absolute; bottom:-3px; left:0; right:0; height:2px; background:#8C2828; border-radius:99px; transform:scaleX(0); transition:transform .25s ease; }
  .nav-link:hover::after { transform:scaleX(1); }
  .faq-answer { max-height:0; overflow:hidden; transition:max-height .4s ease; }
  .faq-answer.open { max-height:400px; }
  .faq-chevron { transition:transform .3s; }
  .faq-item.open .faq-chevron { transform:rotate(180deg); }
  #mobile-nav { max-height:0; overflow:hidden; transition:max-height .35s ease; }
  #mobile-nav.open { max-height:500px; }
  @keyframes float1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)} }
  @keyframes float2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .float1 { animation:float1 5s ease-in-out infinite; }
  .float2 { animation:float2 7s ease-in-out infinite; }
  section { scroll-margin-top:72px; }
  .auth-tab.active { background:#8C2828; color:#fff; }
  .input-field { width:100%; px:4; py:3; border:1.5px solid #d5c8be; border-radius:12px; background:transparent; font-size:.95rem; padding:10px 14px; outline:none; transition:border-color .2s; }
  .input-field:focus { border-color:#8C2828; }
  .dark .input-field { border-color:#4a4035; color:#e8e4da; }
  .dark .input-field:focus { border-color:#b03535; }
  @keyframes slideIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .slide-in { animation:slideIn .35s ease forwards; }
  .badge-active { background:#dcfce7; color:#166534; }
  .badge-pending { background:#fef9c3; color:#854d0e; }
  .badge-suspended { background:#fee2e2; color:#991b1b; }
  .dark .badge-active { background:#14532d; color:#86efac; }
  .dark .badge-pending { background:#422006; color:#fde68a; }
  .dark .badge-suspended { background:#450a0a; color:#fca5a5; }
  .admin-table th { background:#f5f3ef; font-weight:700; font-size:.8rem; text-transform:uppercase; letter-spacing:.05em; color:#8C2828; }
  .dark .admin-table th { background:#2f2c22; }
  .admin-table td { border-bottom:1px solid #e8e4da; font-size:.88rem; }
  .dark .admin-table td { border-bottom:1px solid #3a3628; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:200; display:flex; align-items:center; justify-content:center; padding:16px; }
  .modal-box { background:#fff; border-radius:24px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; }
  .dark .modal-box { background:#2f2c22; }
  .loading-spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,.3); border-top:2px solid #fff; border-radius:50%; animation:spin .6s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>

<body class="bg-[#f5f3ef] dark:bg-[#1e1b14] text-[#1a1613] dark:text-[#e8e4da] antialiased">

<!-- AUTH MODAL -->
<div id="auth-modal" class="modal-overlay hidden">
  <div class="modal-box slide-in p-8">
    <div class="flex gap-2 bg-[#f5f3ef] dark:bg-[#1e1b14] p-1 rounded-xl mb-7">
      <button id="tab-login"    onclick="switchTab('login')"    class="auth-tab active flex-1 py-2.5 rounded-lg font-bold text-sm transition">تسجيل الدخول</button>
      <button id="tab-register" onclick="switchTab('register')" class="auth-tab flex-1 py-2.5 rounded-lg font-bold text-sm transition text-[#6a5a4a] dark:text-[#9a9283]">إنشاء حساب</button>
    </div>

    <!-- Login Form -->
    <form id="form-login" onsubmit="doLogin(event)" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">البريد الإلكتروني أو اسم المستخدم</label>
        <input id="l-email" type="text" class="input-field" placeholder="example@email.com" required>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">كلمة المرور</label>
        <input id="l-pass" type="password" class="input-field" placeholder="••••••••" required>
      </div>
      <p id="login-err" class="text-red-600 text-sm hidden"></p>
      <button type="submit" class="w-full bg-accent hover:bg-accent-dk text-white font-bold py-3 rounded-xl btn-glow transition mt-2 flex items-center justify-center gap-2"><span id="login-spinner" class="loading-spinner hidden"></span>دخول</button>
    </form>

    <!-- Register Form -->
    <form id="form-register" onsubmit="doRegister(event)" class="space-y-4 hidden">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">الاسم الكامل</label>
          <input id="r-name" type="text" class="input-field" placeholder="محمد علي" required>
        </div>
        <div>
          <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">الدولة</label>
          <input id="r-country" type="text" class="input-field" placeholder="لبنان" required>
        </div>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">البريد الإلكتروني</label>
        <input id="r-email" type="email" class="input-field" placeholder="example@email.com" required>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">رقم الهاتف (واتساب)</label>
        <input id="r-phone" type="tel" class="input-field" placeholder="+961 70 000000">
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">كلمة المرور</label>
        <input id="r-pass" type="password" class="input-field" placeholder="8 أحرف على الأقل" required minlength="6">
      </div>
      <p id="register-err" class="text-red-600 text-sm hidden"></p>
      <button type="submit" class="w-full bg-accent hover:bg-accent-dk text-white font-bold py-3 rounded-xl btn-glow transition mt-2 flex items-center justify-center gap-2"><span id="register-spinner" class="loading-spinner hidden"></span>إنشاء الحساب</button>
    </form>

    <button onclick="closeAuth()" class="mt-5 w-full text-sm text-[#9a8a7a] dark:text-[#6a6050] hover:text-accent transition">إلغاء والعودة للموقع</button>
  </div>
</div>

<!-- EDIT USER MODAL (Admin) -->
<div id="edit-modal" class="modal-overlay hidden">
  <div class="modal-box p-8">
    <h3 class="text-xl font-black mb-6">تعديل بيانات المستخدم</h3>
    <form onsubmit="saveEditUser(event)" class="space-y-4">
      <input type="hidden" id="edit-id">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">الاسم</label>
          <input id="edit-name" class="input-field" required>
        </div>
        <div>
          <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">الدولة</label>
          <input id="edit-country" class="input-field">
        </div>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">البريد الإلكتروني</label>
        <input id="edit-email" type="email" class="input-field" required>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">الهاتف</label>
        <input id="edit-phone" class="input-field">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">رأس المال ($)</label>
          <input id="edit-capital" type="number" min="0" class="input-field" placeholder="0">
        </div>
        <div>
          <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">الرصيد المتاح ($)</label>
          <input id="edit-balance" type="number" min="0" class="input-field" placeholder="0">
        </div>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">حالة الحساب</label>
        <select id="edit-status" class="input-field">
          <option value="pending">قيد المراجعة</option>
          <option value="active">نشط</option>
          <option value="suspended">موقوف</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">ملاحظة (اختياري)</label>
        <textarea id="edit-note" class="input-field resize-none" rows="2" placeholder="ملاحظة للأدمن..."></textarea>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit" class="flex-1 bg-accent text-white font-bold py-3 rounded-xl hover:bg-accent-dk transition">حفظ</button>
        <button type="button" onclick="closeEditModal()" class="flex-1 border-2 border-[#d5c8be] dark:border-[#4a4035] font-bold py-3 rounded-xl hover:border-accent transition">إلغاء</button>
      </div>
    </form>
  </div>
</div>

<!-- ADD USER MODAL (Admin) -->
<div id="add-modal" class="modal-overlay hidden">
  <div class="modal-box p-8">
    <h3 class="text-xl font-black mb-6">إضافة مستخدم جديد</h3>
    <form onsubmit="saveAddUser(event)" class="space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">الاسم</label>
          <input id="add-name" class="input-field" required>
        </div>
        <div>
          <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">الدولة</label>
          <input id="add-country" class="input-field" placeholder="لبنان">
        </div>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">البريد الإلكتروني</label>
        <input id="add-email" type="email" class="input-field" required>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">الهاتف</label>
        <input id="add-phone" class="input-field" placeholder="+961...">
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">كلمة المرور</label>
        <input id="add-pass" type="password" class="input-field" required minlength="6">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">رأس المال ($)</label>
          <input id="add-capital" type="number" min="0" class="input-field" placeholder="0">
        </div>
        <div>
          <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">الرصيد المتاح ($)</label>
          <input id="add-balance" type="number" min="0" class="input-field" placeholder="0">
        </div>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1.5 text-[#5a4a3a] dark:text-[#c8c0b0]">حالة الحساب</label>
        <select id="add-status" class="input-field">
          <option value="pending">قيد المراجعة</option>
          <option value="active">نشط</option>
        </select>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit" class="flex-1 bg-accent text-white font-bold py-3 rounded-xl hover:bg-accent-dk transition">إضافة</button>
        <button type="button" onclick="document.getElementById('add-modal').classList.add('hidden')" class="flex-1 border-2 border-[#d5c8be] dark:border-[#4a4035] font-bold py-3 rounded-xl hover:border-accent transition">إلغاء</button>
      </div>
    </form>
  </div>
</div>

<!-- USER DASHBOARD -->
<div id="user-dashboard" class="hidden min-h-screen bg-[#f5f3ef] dark:bg-[#1e1b14]">
  <!-- Nav -->
  <header class="sticky top-0 z-40 bg-[#f5f3ef]/90 dark:bg-[#1e1b14]/90 backdrop-blur-xl border-b border-black/5 dark:border-white/5">
    <div class="max-w-5xl mx-auto px-5 h-16 flex items-center justify-between gap-4">
      <div class="flex items-center gap-2.5">
        <div class="w-9 h-9 rounded-xl bg-accent flex items-center justify-center shadow-lg shadow-accent/30">
          <svg class="w-5 h-5 text-white fill-current" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        </div>
        <span class="font-bold text-lg">Lebanon <span class="text-accent">Capital</span></span>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="toggleDark()" class="w-9 h-9 rounded-full flex items-center justify-center hover:bg-black/6 dark:hover:bg-white/10 transition text-lg"><span id="dark-icon2">🌙</span></button>
        <div class="hidden sm:flex items-center gap-2 text-sm font-semibold">
          <div class="w-8 h-8 rounded-full bg-accent flex items-center justify-center text-white text-xs font-black" id="dash-avatar">م</div>
          <span id="dash-username" class="text-[#5a4a3a] dark:text-[#c8c0b0]">المستخدم</span>
        </div>
        <button onclick="doLogout()" class="flex items-center gap-1.5 text-sm font-semibold text-[#9a8a7a] hover:text-accent transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0[...]/></svg>
          خروج
        </button>
      </div>
    </div>
  </header>

  <div class="max-w-5xl mx-auto px-5 py-10 space-y-8">
    <!-- Welcome + Status -->
    <div class="flex flex-wrap items-center justify-between gap-4">
      <div>
        <h1 class="text-2xl md:text-3xl font-black">أهلاً، <span id="dash-name" class="text-accent">المستخدم</span> 👋</h1>
        <p class="text-[#6a5a4a] dark:text-[#9a9283] text-sm mt-1">لوحة التحكم الخاصة بك</p>
      </div>
      <span id="dash-status-badge" class="badge-pending px-4 py-1.5 rounded-full text-sm font-bold">قيد المراجعة</span>
    </div>

    <!-- Balance Cards -->
    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
      <div class="bg-white dark:bg-[#2f2c22] rounded-2xl p-6 border border-black/5 dark:border-white/5 shadow-sm col-span-2 md:col-span-1">
        <p class="text-xs font-bold text-[#9a8a7a] uppercase tracking-wider mb-3">رأس المال</p>
        <p class="text-3xl font-black text-accent">$<span id="dash-capital">0</span></p>
        <p class="text-xs text-[#9a8a7a] mt-1">المبلغ المُودَع</p>
      </div>

      <div class="bg-white dark:bg-[#2f2c22] rounded-2xl p-6 border border-black/5 dark:border-white/5 shadow-sm">
        <p class="text-xs font-bold text-[#9a8a7a] uppercase tracking-wider mb-3">الرصيد المتاح</p>
        <p class="text-3xl font-black text-green-600">$<span id="dash-balance">0</span></p>
        <p class="text-xs text-[#9a8a7a] mt-1">جاهز للسحب</p>
      </div>

      <div class="bg-white dark:bg-[#2f2c22] rounded-2xl p-6 border border-black/5 dark:border-white/5 shadow-sm">
        <p class="text-xs font-bold text-[#9a8a7a] uppercase tracking-wider mb-3">تاريخ الانضمام</p>
        <p class="text-xl font-black" id="dash-join">—</p>
        <p class="text-xs text-[#9a8a7a] mt-1">عضو منذ</p>
      </div>
    </div>

    <!-- Actions -->
    <div class="grid sm:grid-cols-2 gap-4">
      <div class="bg-white dark:bg-[#2f2c22] rounded-2xl p-7 border border-black/5 dark:border-white/5 shadow-sm">
        <div class="w-12 h-12 bg-green-100 dark:bg-green-900/30 rounded-xl flex items-center justify-center mb-4">
          <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        </div>
        <h3 class="font-black text-xl mb-2">إيداع</h3>
        <p class="text-[#6a5a4a] dark:text-[#9a9283] text-sm mb-5 leading-relaxed">لإيداع مبلغ جديد أو زيادة رأس مالك، تواصل معنا مباشرةً عبر واتساب.</p>
        <a id="deposit-btn" href="#" target="_blank" class="flex items-center justify-center gap-2 bg-accent hover:bg-accent-dk text-white font-bold py-3 rounded-xl btn-glow transition">
          تواصل معنا للإيداع
        </a>
      </div>

      <div class="bg-white dark:bg-[#2f2c22] rounded-2xl p-7 border border-black/5 dark:border-white/5 shadow-sm">
        <div class="w-12 h-12 bg-accent/10 rounded-xl flex items-center justify-center mb-4">
          <svg class="w-6 h-6 text-accent" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1"/></svg>
        </div>
        <h3 class="font-black text-xl mb-2">سحب الأرباح</h3>
        <p class="text-[#6a5a4a] dark:text-[#9a9283] text-sm mb-5 leading-relaxed">لطلب سحب رصيدك المتاح، تواصل معنا وسيتم التحويل خلال 24 ساعة.</p>
        <a id="withdraw-btn" href="#" target="_blank" class="flex items-center justify-center gap-2 border-2 border-accent text-accent hover:bg-accent hover:text-white font-bold py-3 rounded-xl transition">
          طلب السحب عبر واتساب
        </a>
      </div>
    </div>

    <!-- Profile Info -->
    <div class="bg-white dark:bg-[#2f2c22] rounded-2xl p-7 border border-black/5 dark:border-white/5 shadow-sm">
      <div class="flex items-center justify-between mb-6">
        <h3 class="font-black text-xl">معلومات الحساب</h3>
        <button onclick="toggleEditProfile()" id="edit-profile-btn" class="text-sm font-semibold text-accent hover:underline">تعديل</button>
      </div>
      <!-- View mode -->
      <div id="profile-view" class="grid sm:grid-cols-2 gap-5">
        <div><p class="text-xs text-[#9a8a7a] font-semibold uppercase mb-1">الاسم الكامل</p><p class="font-bold" id="pv-name">—</p></div>
        <div><p class="text-xs text-[#9a8a7a] font-semibold uppercase mb-1">البريد الإلكتروني</p><p class="font-bold" id="pv-email">—</p></div>
        <div><p class="text-xs text-[#9a8a7a] font-semibold uppercase mb-1">الدولة</p><p class="font-bold" id="pv-country">—</p></div>
        <div><p class="text-xs text-[#9a8a7a] font-semibold uppercase mb-1">رقم الهاتف</p><p class="font-bold" id="pv-phone">—</p></div>
      </div>
      <!-- Edit mode -->
      <form id="profile-edit" class="hidden space-y-4" onsubmit="saveProfile(event)">
        <div class="grid sm:grid-cols-2 gap-4">
          <div><label class="block text-sm font-semibold mb-1">الاسم</label><input id="pe-name" class="input-field" required></div>
          <div><label class="block text-sm font-semibold mb-1">الدولة</label><input id="pe-country" class="input-field"></div>
