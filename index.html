  * { font-family: 'Tajawal', sans-serif; }

<!-- Patch script to prevent blank screen after login/register -->
<script>
(function(){
  // Flexible API URL: use window.__API_URL__ if set, otherwise choose sane default
  const API_URL_NEW = window.__API_URL__ || (function(){
    try{
      const loc = window.location;
      if (loc.hostname === 'localhost' || loc.hostname === '127.0.0.1') return 'http://localhost:5000/api';
      return `${loc.protocol}//${loc.hostname}${loc.port?':'+loc.port:''}/api`;
    } catch(e) { return 'http://localhost:5000/api'; }
  })();

  // Safe JSON parser for fetch responses
  async function safeJson(res){
    if (!res) return null;
    const text = await res.text().catch(()=>null);
    if (!text) return null;
    try { return JSON.parse(text); } catch (err) { console.error('Invalid JSON from server:', err, 'response text:', text); return null; }
  }

  // expose for debugging
  window.API_URL = API_URL_NEW;
  window.safeJson = safeJson;

  // Override doRegister
  window.doRegister = async function(e){
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    const spinner = e.target.querySelector('.loading-spinner');
    if (btn) btn.disabled = true;
    if (spinner) spinner.classList.remove('hidden');
    try{
      const payload = {
        name: document.getElementById('r-name').value.trim(),
        email: document.getElementById('r-email').value.trim().toLowerCase(),
        password: document.getElementById('r-pass').value,
        country: document.getElementById('r-country').value.trim(),
        phone: document.getElementById('r-phone').value.trim()
      };
      const res = await fetch(`${API_URL_NEW}/auth/register`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
      });
      const data = await safeJson(res);
      if (!data) {
        const errEl = document.getElementById('register-err');
        if (errEl) { errEl.textContent = 'استجابة غير صحيحة من الخادم'; errEl.classList.remove('hidden'); }
        else alert('استجابة غير صحيحة من الخادم');
        return;
      }
      if (data.success) {
        if (data.token) localStorage.setItem('lc_token', data.token);
        localStorage.setItem('lc_isAdmin', 'false');
        closeAuth();
        showPage('dashboard');
        if (typeof loadDashboard === 'function') loadDashboard();
      } else {
        const errEl = document.getElementById('register-err');
        if (errEl) { errEl.textContent = data.message || 'خطأ'; errEl.classList.remove('hidden'); }
      }
    } catch (err) {
      console.error('Register override error:', err);
      const errEl = document.getElementById('register-err');
      if (errEl) { errEl.textContent = 'خطأ في الاتصال بالخادم'; errEl.classList.remove('hidden'); }
    } finally {
      if (btn) btn.disabled = false;
      if (spinner) spinner.classList.add('hidden');
    }
  };

  // Override doLogin
  window.doLogin = async function(e){
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    const spinner = e.target.querySelector('.loading-spinner');
    if (btn) btn.disabled = true;
    if (spinner) spinner.classList.remove('hidden');
    try{
      const email = document.getElementById('l-email').value.trim().toLowerCase();
      const password = document.getElementById('l-pass').value;
      const isAdminLogin = email === 'admin' || email.endsWith('@admin');
      const res = await fetch(`${API_URL_NEW}/auth/login`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: isAdminLogin ? 'admin' : email, password, isAdmin: isAdminLogin })
      });
      const data = await safeJson(res);
      if (!data) {
        const errEl = document.getElementById('login-err');
        if (errEl) { errEl.textContent = 'استجابة غير صحيحة من الخادم'; errEl.classList.remove('hidden'); }
        else alert('استجابة غير صحيحة من الخادم');
        return;
      }
      if (data.success) {
        if (data.token) localStorage.setItem('lc_token', data.token);
        localStorage.setItem('lc_isAdmin', isAdminLogin ? 'true' : 'false');
        closeAuth();
        if (isAdminLogin) { showPage('admin'); if (typeof loadAdmin === 'function') loadAdmin(); }
        else { showPage('dashboard'); if (typeof loadDashboard === 'function') loadDashboard(); }
      } else {
        const errEl = document.getElementById('login-err');
        if (errEl) { errEl.textContent = data.message || 'خطأ'; errEl.classList.remove('hidden'); }
      }
    } catch (err) {
      console.error('Login override error:', err);
      const errEl = document.getElementById('login-err');
      if (errEl) { errEl.textContent = 'خطأ في الاتصال بالخادم'; errEl.classList.remove('hidden'); }
    } finally {
      if (btn) btn.disabled = false;
      if (spinner) spinner.classList.add('hidden');
    }
  };

  // Override loadDashboard to be resilient
  window.loadDashboard = async function(){
    try{
      const token = localStorage.getItem('lc_token');
      if (!token) { 
        // fallback to client-side session (for older local-storage mode)
        const sessRaw = sessionStorage.getItem('lc_session');
        if (sessRaw) {
          try{
            const sess = JSON.parse(sessRaw);
            if (sess?.userId && typeof window.loadDashboard === 'function') {
              // if original client-side load exists, call it (some versions used different implementation)
            }
          } catch(e){}
        }
        doLogout();
        return;
      }
      const res = await fetch(`${API_URL_NEW}/user/profile`, { headers: { 'Authorization': `Bearer ${token}` } });
      const data = await safeJson(res);
      if (!data) {
        console.warn('loadDashboard: invalid server response');
        alert('تعذر الاتصال بخادم البيانات. سيتم إعادة التوجيه للصفحة العامة.');
        doLogout();
        return;
      }
      if (!data.success) { doLogout(); return; }
      const user = data.user;
      if (user) {
        if (document.getElementById('dash-name')) document.getElementById('dash-name').textContent = user.name;
        if (document.getElementById('dash-username')) document.getElementById('dash-username').textContent = user.name.split(' ')[0];
        if (document.getElementById('dash-avatar')) document.getElementById('dash-avatar').textContent = user.name.charAt(0);
        if (document.getElementById('dash-capital')) document.getElementById('dash-capital').textContent = Number(user.capital || 0).toLocaleString();
        if (document.getElementById('dash-balance')) document.getElementById('dash-balance').textContent = Number(user.balance || 0).toLocaleString();
        if (document.getElementById('dash-join')) document.getElementById('dash-join').textContent = new Date(user.createdAt).toLocaleDateString('ar-LB');
        const badge = document.getElementById('dash-status-badge');
        if (badge) {
          const statusMap = { active: ['badge-active','نشط ✓'], pending: ['badge-pending','قيد المراجعة'], suspended: ['badge-suspended','موقوف'] };
          const [cls,label] = statusMap[user.status] || statusMap.pending;
          badge.className = `${cls} px-4 py-1.5 rounded-full text-sm font-bold`;
          badge.textContent = label;
        }
        if (document.getElementById('pv-name')) document.getElementById('pv-name').textContent = user.name;
        if (document.getElementById('pv-email')) document.getElementById('pv-email').textContent = user.email;
        if (document.getElementById('pv-country')) document.getElementById('pv-country').textContent = user.country || '—';
        if (document.getElementById('pv-phone')) document.getElementById('pv-phone').textContent = user.phone || '—';
        if (document.getElementById('pe-name')) document.getElementById('pe-name').value = user.name;
        if (document.getElementById('pe-country')) document.getElementById('pe-country').value = user.country || '';
        if (document.getElementById('pe-phone')) document.getElementById('pe-phone').value = user.phone || '';
        if (user.note){
          const nb = document.getElementById('admin-note-box'); if (nb) nb.classList.remove('hidden');
          const nt = document.getElementById('admin-note-text'); if (nt) nt.textContent = user.note;
        }
      }
    } catch (err) {
      console.error('loadDashboard override error:', err);
      alert('حدث خطأ أثناء تحميل لوحة التحكم. يرجى المحاولة لاحقاً.');
      doLogout();
    }
  };

  console.log('Auth guard overrides applied; API_URL=', API_URL_NEW);
})();
</script>
</body>
